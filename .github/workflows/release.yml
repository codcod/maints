name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-universal:
    name: Build macOS Universal Binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o triage-arm64 .

      - name: Build amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o triage-amd64 .

      - name: Create universal binary
        run: lipo -create -output triage triage-arm64 triage-amd64

      - name: Verify universal binary
        run: lipo -info triage

      - name: Create archive
        run: |
          tar -czf triage-${{ github.ref_name }}-darwin-universal.tar.gz triage
          shasum -a 256 triage-${{ github.ref_name }}-darwin-universal.tar.gz > triage-${{ github.ref_name }}-darwin-universal.tar.gz.sha256

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            triage-${{ github.ref_name }}-darwin-universal.tar.gz
            triage-${{ github.ref_name }}-darwin-universal.tar.gz.sha256
